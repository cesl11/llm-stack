services:

  litellm:
    image: ghcr.io/berriai/litellm:v1.81.14-stable
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://litellm:litellm@postgres:5432/litellm
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    command:
      - --config
      - /app/config.yaml
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - litellm_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  litellm_pg: